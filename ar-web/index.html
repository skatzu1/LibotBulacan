<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: black; }

      #loader {
        position: absolute; inset: 0; z-index: 999;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
      }
      #loader p { color: white; font-family: sans-serif; font-size: 16px; }

      #hint {
        position: absolute; bottom: 0; width: 100%;
        padding: 20px; background: rgba(0,0,0,0.75);
        color: white; font-family: sans-serif;
        font-size: 15px; text-align: center; z-index: 10;
      }

      #collect-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.9);
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: bold;
        padding: 14px 28px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #already-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(180,100,0,0.9);
        color: white; font-family: sans-serif;
        font-size: 16px; font-weight: bold;
        padding: 12px 24px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #gps-error {
        position: absolute; top: 0; left: 0; right: 0;
        background: rgba(255, 60, 60, 0.9);
        color: white; font-family: sans-serif; font-size: 13px;
        text-align: center; padding: 10px 16px;
        z-index: 200; display: none;
      }

      /* Crosshair tap target in the center of the screen */
      #tap-target {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 36px; height: 36px;
        border: 2px solid rgba(255,255,255,0.7);
        border-radius: 50%;
        z-index: 10; pointer-events: none;
      }
      #tap-target::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 6px; height: 6px;
        background: white;
        border-radius: 50%;
      }
    </style>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>

  <body>
    <div id="loader">
      <p id="loader-text">Acquiring GPS signal...</p>
    </div>

    <div id="gps-error"></div>
    <div id="tap-target"></div>
    <div id="hint">Point at a 3D model and tap the screen to collect it!</div>
    <div id="collect-toast">✅ Collected!</div>
    <div id="already-toast">Already collected!</div>

    <a-scene
      id="ar-scene"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
      loading-screen="enabled: false"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable; far: 10000"
    >
      <a-assets id="ar-assets"></a-assets>

      <!-- Camera with touch-based cursor for tap-to-collect -->
      <a-camera
        gps-new-camera="gpsMinDistance: 5"
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="objects: .clickable; far: 10000"
      ></a-camera>
    </a-scene>

    <script>
      // ─── State ──────────────────────────────────────────────────────────────
      const sessionCollected   = new Set();
      const previouslyCollected = new Set();
      const spawnedEntities    = {};

      // ─── Show toast helper ───────────────────────────────────────────────────
      function showToast(id, duration = 1800) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, duration);
      }

      // ─── Spawn 3D models ─────────────────────────────────────────────────────
      function spawnModels(locations) {
        if (!Array.isArray(locations) || !locations.length) return;

        const scene  = document.getElementById('ar-scene');
        const assets = document.getElementById('ar-assets');

        locations.forEach((loc) => {
          const { id, latitude, longitude, modelUrl, name } = loc;
          if (!id || latitude == null || longitude == null || !modelUrl) return;

          if (spawnedEntities[id])       return;
          if (previouslyCollected.has(id)) return;

          // Register asset
          const assetItem = document.createElement('a-asset-item');
          assetItem.setAttribute('id',  `asset-${id}`);
          assetItem.setAttribute('src', modelUrl);
          assets.appendChild(assetItem);

          // AR entity — scale reduced to 0.5 0.5 0.5 (was 2 2 2)
          const entity = document.createElement('a-entity');
          entity.setAttribute('id', `model-${id}`);
          entity.setAttribute('gltf-model', `#asset-${id}`);
          entity.setAttribute('scale', '0.05 0.05 0.05');
          entity.setAttribute('rotation', '0 0 0');
          entity.setAttribute('gps-new-entity-place',
            `latitude: ${latitude}; longitude: ${longitude}`
          );
          entity.classList.add('clickable');
          entity.dataset.locationId   = id;
          entity.dataset.locationName = name ?? '';

          // ── Collect on click (A-Frame raycaster fires this on tap) ──────────
          entity.addEventListener('click', () => tryCollect(entity, loc));

          scene.appendChild(entity);
          spawnedEntities[id] = entity;
        });
      }

      // ─── Fallback: tap anywhere on screen → raycast manually ─────────────────
      // Handles cases where A-Frame cursor doesn't fire 'click' on the entity
      document.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        const scene = document.getElementById('ar-scene');
        if (!scene || !scene.camera) return;

        const camera   = scene.camera;
        const renderer = scene.renderer;
        if (!renderer) return;

        const rect = renderer.domElement.getBoundingClientRect();
        const x    = ((touch.clientX - rect.left) / rect.width)  * 2 - 1;
        const y   = -((touch.clientY - rect.top)  / rect.height) * 2 + 1;

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera({ x, y }, camera);

        // Collect mesh objects from all spawned entities
        const meshes = [];
        Object.entries(spawnedEntities).forEach(([id, entity]) => {
          entity.object3D.traverse((node) => {
            if (node.isMesh) {
              node._locationId = id;
              meshes.push(node);
            }
          });
        });

        const hits = raycaster.intersectObjects(meshes, false);
        if (hits.length > 0) {
          const lid    = hits[0].object._locationId;
          const entity = spawnedEntities[lid];
          const loc    = entity
            ? { id: lid, name: entity.dataset.locationName }
            : null;
          if (entity && loc) tryCollect(entity, loc);
        }
      });

      // ─── Attempt to collect ───────────────────────────────────────────────────
      function tryCollect(entity, loc) {
        const lid = entity.dataset.locationId;

        if (previouslyCollected.has(lid) || sessionCollected.has(lid)) {
          showToast('already-toast');
          return;
        }

        sessionCollected.add(lid);
        collectModel(entity, loc);
      }

      // ─── Collect a model ─────────────────────────────────────────────────────
      function collectModel(entity, loc) {
        const lid = entity.dataset.locationId;

        const payload = {
          type:        'AR_COLLECTED',
          modelId:     lid,
          modelName:   loc.name ?? '',
          modelUrl:    loc.modelUrl   ?? '',
          latitude:    loc.latitude   ?? 0,
          longitude:   loc.longitude  ?? 0,
          collectedAt: new Date().toISOString(),
        };

        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(payload));
        } else {
          window.postMessage(JSON.stringify(payload), '*');
          console.log('[AR_COLLECTED]', payload);
        }

        showToast('collect-toast');

        // Shrink and remove
        entity.setAttribute('animation', {
          property: 'scale',
          to:       '0 0 0',
          dur:      500,
          easing:   'easeInQuad',
        });
        setTimeout(() => {
          if (entity.parentNode) entity.parentNode.removeChild(entity);
          delete spawnedEntities[lid];
        }, 550);
      }

      // ─── Messages from React Native ───────────────────────────────────────────
      window.addEventListener('message', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'AR_CONFIG') {
            if (Array.isArray(data.collectedIds)) {
              data.collectedIds.forEach((id) => previouslyCollected.add(id));
            }
            if (Array.isArray(data.locations)) {
              spawnModels(data.locations);
            }
          }
        } catch (_) {}
      });

      // ─── GPS ready → hide loader → signal AR_READY ───────────────────────────
      document.getElementById('ar-scene').addEventListener('loaded', () => {
        navigator.geolocation.getCurrentPosition(
          () => {
            document.getElementById('loader').style.display = 'none';
            const msg = JSON.stringify({ type: 'AR_READY' });
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(msg);
            } else {
              window.postMessage(msg, '*');
            }
          },
          (err) => {
            document.getElementById('loader-text').textContent =
              'GPS error: ' + err.message;
            const banner = document.getElementById('gps-error');
            banner.textContent   = '⚠️ ' + err.message;
            banner.style.display = 'block';
          },
          { enableHighAccuracy: true }
        );
      });
    </script>
  </body>
</html>
