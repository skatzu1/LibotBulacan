<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: black; }

      a-scene { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

      #loader {
        position: absolute; inset: 0; z-index: 999;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
      }
      #loader p { color: white; font-family: sans-serif; font-size: 16px; }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #00ff88;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #hint {
        position: absolute; bottom: 0; width: 100%;
        padding: 20px; background: rgba(0,0,0,0.75);
        color: white; font-family: sans-serif;
        font-size: 15px; text-align: center; z-index: 10;
      }

      #collect-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.9);
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: bold;
        padding: 14px 28px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #gps-error {
        position: absolute; top: 0; left: 0; right: 0;
        background: rgba(255, 60, 60, 0.9);
        color: white; font-family: sans-serif; font-size: 13px;
        text-align: center; padding: 10px 16px;
        z-index: 200; display: none;
      }

      #debug { position: absolute; bottom: 70px; left: 0; right: 0; background: rgba(0,0,0,0.75); color: #0f0; font-family: monospace; font-size: 12px; padding: 6px 10px; z-index: 300; text-align: center; word-break: break-all; }
    </style>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>

  <body>
    <div id="loader">
      <div class="spinner"></div>
      <p id="loader-text">Acquiring GPS signal...</p>
    </div>

    <div id="gps-error"></div>
    <div id="hint">Point your camera around - tap a model to collect it!</div>
    <div id="collect-toast">Collected!</div>
    <div id="debug">Waiting for GPS...</div>

    <a-scene
      id="ar-scene"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true"
      loading-screen="enabled: false"
      embedded
    >
      <!-- ✅ FIX 1: Lights — without these, GLTF models render completely black -->
      <a-light type="ambient"     color="#ffffff" intensity="1.0"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.8" position="1 4 2"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.4" position="-1 2 -1"></a-light>

      <!-- ✅ FIX 2: Raycaster on camera so tap/click events reach 3D entities -->
      <a-camera
        id="ar-camera"
        gps-new-camera="gpsMinDistance: 5"
        rotation-reader
        raycaster="objects: [gltf-model]; far: 300"
        cursor="fuse: false; rayOrigin: mouse"
      ></a-camera>
    </a-scene>

    <script>
      const collectedIds = new Set();
      let   pendingLocs  = null;
      let   gpsReady     = false;

      function dbg(msg) {
        const el = document.getElementById('debug');
        if (el) el.textContent = msg;
        console.log('[AR]', msg);
      }

      // ── signalReady — tells React Native the AR scene is ready ───────────────
      function signalReady() {
        var msg = JSON.stringify({ type: 'AR_READY' });
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(msg);
        } else {
          window.postMessage(msg, '*');
        }
        dbg('AR_READY sent to React Native');
      }

      // ── spawnModels ───────────────────────────────────────────────────────────
      // KEY: gltf-model lives on a CHILD entity, NOT the same element as
      // gps-new-entity-place — AR.js silently drops the model otherwise.
      function spawnModels(locations) {
        if (!Array.isArray(locations) || !locations.length) {
          dbg('No locations to spawn.');
          return;
        }

        const scene = document.getElementById('ar-scene');
        let count = 0;

        locations.forEach(function(loc) {
          var id       = loc.id;
          var latitude = loc.latitude;
          var longitude= loc.longitude;
          var modelUrl = loc.modelUrl;
          var name     = loc.name;

          if (!id || latitude == null || longitude == null || !modelUrl) {
            console.warn('[AR] Skipping invalid loc:', loc);
            return;
          }
          if (collectedIds.has(id)) return;

          // Remove stale entity if re-injected
          var old = document.getElementById('gps-' + id);
          if (old) old.parentNode.removeChild(old);

          // ── GPS wrapper (parent) ─────────────────────────────────────────────
          // Offset ~8 meters north so model never spawns ON TOP of the user
          var OFFSET_METERS = 8;
          var EARTH_R = 6371000;
          var spawnLat = latitude  + (OFFSET_METERS / EARTH_R) * (180 / Math.PI);
          var spawnLng = longitude + (OFFSET_METERS / EARTH_R) * (180 / Math.PI) / Math.cos(latitude * Math.PI / 180);

          var wrapper = document.createElement('a-entity');
          wrapper.setAttribute('id', 'gps-' + id);
          wrapper.setAttribute('gps-new-entity-place',
            'latitude: ' + spawnLat + '; longitude: ' + spawnLng);
          wrapper.dataset.locationId = id;

          // ── Model child ──────────────────────────────────────────────────────
          var modelEl = document.createElement('a-entity');
          modelEl.setAttribute('gltf-model', modelUrl);
          modelEl.setAttribute('scale', '5 5 5');
          modelEl.setAttribute('position', '0 0 0');
          modelEl.setAttribute('rotation', '0 0 0');
          // Slow spin so the model is always visible from any angle
          modelEl.setAttribute('animation',
            'property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear'
          );

          modelEl.addEventListener('model-loaded', function() {
            dbg('Model loaded: ' + (name || id));
            console.log('[AR] model-loaded:', name || id);
          });
          modelEl.addEventListener('model-error', function(e) {
            console.error('[AR] model-error:', name || id, modelUrl, e.detail);
            dbg('Model ERROR - likely CORS: ' + (name || id));
            // Fallback green box so you can confirm GPS placement is correct
            // even if the .glb fails to load due to CORS
            var fallback = document.createElement('a-box');
            fallback.setAttribute('color', '#00ff88');
            fallback.setAttribute('scale', '1 1 1');
            fallback.setAttribute('position', '0 1.5 0');
            fallback.setAttribute('animation',
              'property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear'
            );
            wrapper.appendChild(fallback);
          });

          // Tap to collect
          modelEl.setAttribute('class', 'clickable');
          modelEl.addEventListener('click', function(e) {
            e.stopPropagation();
            collectModel(wrapper, loc);
          });

          wrapper.appendChild(modelEl);
          scene.appendChild(wrapper);
          count++;
          dbg('Placed ' + count + '/' + locations.length + ': ' + (name || id));
        });
      }

      // ── collectModel ──────────────────────────────────────────────────────────
      function collectModel(wrapperEl, loc) {
        var lid = wrapperEl.dataset.locationId;
        if (collectedIds.has(lid)) return;
        collectedIds.add(lid);

        var payload = {
          type:        'AR_COLLECTED',
          modelId:     lid,
          modelUrl:    loc.modelUrl,
          latitude:    loc.latitude,
          longitude:   loc.longitude,
          collectedAt: new Date().toISOString(),
        };

        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(payload));
        } else {
          window.postMessage(JSON.stringify(payload), '*');
        }

        var toast = document.getElementById('collect-toast');
        toast.style.display = 'block';
        setTimeout(function() { toast.style.display = 'none'; }, 1800);

        var modelEl = wrapperEl.querySelector('[gltf-model]');
        if (modelEl) {
          modelEl.setAttribute('animation__collect',
            'property: scale; to: 0 0 0; dur: 500; easing: easeInQuad'
          );
        }
        setTimeout(function() {
          if (wrapperEl.parentNode) wrapperEl.parentNode.removeChild(wrapperEl);
        }, 550);
      }

      // ── Receive AR_CONFIG from React Native ───────────────────────────────────
      // ✅ FIX 5: Listen on BOTH window and document for maximum compatibility
      // with how React Native WebView injects postMessage
      function handleARConfig(data) {
        if (data && data.type === 'AR_CONFIG' && Array.isArray(data.locations)) {
          dbg('AR_CONFIG received: ' + data.locations.length + ' loc(s)');
          if (gpsReady) {
            spawnModels(data.locations);
          } else {
            pendingLocs = data.locations;
            dbg('Queued — waiting for GPS fix');
          }
        }
      }

      window.addEventListener('message', function(e) {
        var data;
        try { data = JSON.parse(e.data); } catch (_) { return; }
        handleARConfig(data);
      });

      document.addEventListener('message', function(e) {
        var data;
        try { data = JSON.parse(e.data); } catch (_) { return; }
        handleARConfig(data);
      });

      // ✅ FIX 6: Also expose a global function React Native can call directly
      // via injectJavaScript as a fallback
      window.receiveARConfig = function(locations) {
        handleARConfig({ type: 'AR_CONFIG', locations: locations });
      };

      // ── Wait for GPS lock ─────────────────────────────────────────────────────
      document.getElementById('ar-scene').addEventListener('loaded', function() {
        dbg('Scene loaded — waiting for GPS fix...');

        var cam = document.getElementById('ar-camera');

        cam.addEventListener('gps-camera-update-position', function(e) {
          if (gpsReady) return;
          gpsReady = true;

          var lat = e.detail.position.latitude;
          var lng = e.detail.position.longitude;
          document.getElementById('loader').style.display = 'none';
          dbg('GPS OK: ' + lat.toFixed(5) + ', ' + lng.toFixed(5));

          signalReady();

          if (pendingLocs) {
            spawnModels(pendingLocs);
            pendingLocs = null;
          }
        });

        // Safety fallback if GPS never fires (indoors / simulator)
        setTimeout(function() {
          if (!gpsReady) {
            gpsReady = true;
            document.getElementById('loader').style.display = 'none';
            var errEl = document.getElementById('gps-error');
            errEl.textContent = 'GPS signal unavailable — models may not appear in correct positions.';
            errEl.style.display = 'block';
            dbg('GPS timeout — forcing ready state');
            signalReady();
            if (pendingLocs) {
              spawnModels(pendingLocs);
              pendingLocs = null;
            }
          }
        }, 8000);
      });
    </script>
  </body>
</html>
