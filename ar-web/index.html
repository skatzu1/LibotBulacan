<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: black; }

      #loader {
        position: absolute; inset: 0; z-index: 999;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
      }
      #loader p { color: white; font-family: sans-serif; font-size: 16px; }

      #hint {
        position: absolute; bottom: 0; width: 100%;
        padding: 20px; background: rgba(0,0,0,0.75);
        color: white; font-family: sans-serif;
        font-size: 15px; text-align: center; z-index: 10;
      }

      #collect-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.9);
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: bold;
        padding: 14px 28px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #already-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(180,100,0,0.9);
        color: white; font-family: sans-serif;
        font-size: 16px; font-weight: bold;
        padding: 12px 24px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #gps-error {
        position: absolute; top: 0; left: 0; right: 0;
        background: rgba(255, 60, 60, 0.9);
        color: white; font-family: sans-serif; font-size: 13px;
        text-align: center; padding: 10px 16px;
        z-index: 200; display: none;
      }
    </style>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>

  <body>
    <div id="loader">
      <p id="loader-text">Acquiring GPS signal...</p>
    </div>

    <div id="gps-error"></div>
    <div id="hint">Walk to a landmark and tap the 3D model to collect it!</div>
    <div id="collect-toast">✅ Collected!</div>
    <div id="already-toast">Already collected!</div>

    <a-scene
      id="ar-scene"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
      loading-screen="enabled: false"
    >
      <a-assets id="ar-assets"></a-assets>
      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>
    </a-scene>

    <script>
      // ─── State ──────────────────────────────────────────────────────────────
      // IDs collected during THIS session (prevents double-tap in same session)
      const sessionCollected = new Set();

      // IDs that were already collected BEFORE this session (sent via AR_CONFIG)
      // These are filtered out on the React Native side before injection,
      // but we keep a local guard here as a safety net.
      const previouslyCollected = new Set();

      // All spawned entities keyed by ID
      const spawnedEntities = {};

      // ─── Haversine (mirrors native side for client-side double-check) ────────
      function getDistanceMeters(lat1, lng1, lat2, lng2) {
        const R  = 6371000;
        const p1 = (lat1 * Math.PI) / 180;
        const p2 = (lat2 * Math.PI) / 180;
        const dp = ((lat2 - lat1) * Math.PI) / 180;
        const dl = ((lng2 - lng1) * Math.PI) / 180;
        const a  = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      // ─── Show toast helper ───────────────────────────────────────────────────
      function showToast(id, duration = 1800) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, duration);
      }

      // ─── Spawn 3-D models ────────────────────────────────────────────────────
      // Receives only nearby, uncollected locations from ARScreen.js.
      // Each loc: { id, name, latitude, longitude, modelUrl, landmarkLat, landmarkLng }
      function spawnModels(locations) {
        if (!Array.isArray(locations) || !locations.length) return;

        const scene  = document.getElementById('ar-scene');
        const assets = document.getElementById('ar-assets');

        locations.forEach((loc) => {
          const { id, latitude, longitude, modelUrl, name } = loc;
          if (!id || latitude == null || longitude == null || !modelUrl) return;

          // Don't spawn duplicates if AR_CONFIG fires more than once
          if (spawnedEntities[id]) return;

          // Don't spawn anything already collected in a previous session
          if (previouslyCollected.has(id)) return;

          // Register asset for A-Frame preloading
          const assetItem = document.createElement('a-asset-item');
          assetItem.setAttribute('id', `asset-${id}`);
          assetItem.setAttribute('src', modelUrl);
          assets.appendChild(assetItem);

          // AR entity pinned to modelCoordinates
          const entity = document.createElement('a-entity');
          entity.setAttribute('id', `model-${id}`);
          entity.setAttribute('gltf-model', `#asset-${id}`);
          entity.setAttribute('scale', '2 2 2');
          entity.setAttribute('rotation', '0 0 0');
          entity.setAttribute('gps-new-entity-place',
            `latitude: ${latitude}; longitude: ${longitude}`
          );
          entity.classList.add('clickable');
          entity.dataset.locationId  = id;
          entity.dataset.locationName = name ?? '';

          // Tap / click to collect
          entity.addEventListener('click',      () => tryCollect(entity, loc));
          entity.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            tryCollect(entity, loc);
          });

          scene.appendChild(entity);
          spawnedEntities[id] = entity;
        });
      }

      // ─── Attempt to collect a model ──────────────────────────────────────────
      function tryCollect(entity, loc) {
        const lid = entity.dataset.locationId;

        // Guard: already collected in previous sessions
        if (previouslyCollected.has(lid)) {
          showToast('already-toast');
          return;
        }

        // Guard: already collected this session
        if (sessionCollected.has(lid)) {
          showToast('already-toast');
          return;
        }

        sessionCollected.add(lid);
        collectModel(entity, loc);
      }

      // ─── Collect a model ─────────────────────────────────────────────────────
      function collectModel(entity, loc) {
        const lid = entity.dataset.locationId;

        const payload = {
          type:        'AR_COLLECTED',
          modelId:     lid,
          modelName:   loc.name ?? '',
          modelUrl:    loc.modelUrl,
          latitude:    loc.latitude,
          longitude:   loc.longitude,
          collectedAt: new Date().toISOString(),
        };

        // Notify React Native — ARScreen.js will persist to backend
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(payload));
        } else {
          window.postMessage(JSON.stringify(payload), '*');
          console.log('[AR_COLLECTED]', payload);
        }

        showToast('collect-toast');

        // Animate model away then remove it
        entity.setAttribute('animation', {
          property: 'scale',
          to:       '0 0 0',
          dur:      500,
          easing:   'easeInQuad',
        });
        setTimeout(() => {
          if (entity.parentNode) entity.parentNode.removeChild(entity);
          delete spawnedEntities[lid];
        }, 550);
      }

      // ─── Receive messages from React Native / ARScreen.js ────────────────────
      // Expected message types:
      //   AR_CONFIG  { type, locations: [...], collectedIds: [...] }
      window.addEventListener('message', (e) => {
        try {
          const data = JSON.parse(e.data);

          if (data.type === 'AR_CONFIG') {
            // Mark previously collected IDs so we can guard against them
            if (Array.isArray(data.collectedIds)) {
              data.collectedIds.forEach((id) => previouslyCollected.add(id));
            }
            // Spawn only what React Native decided is eligible
            if (Array.isArray(data.locations)) {
              spawnModels(data.locations);
            }
          }
        } catch (_) {}
      });

      // ─── GPS ready → hide loader → signal AR_READY ───────────────────────────
      document.getElementById('ar-scene').addEventListener('loaded', () => {
        navigator.geolocation.getCurrentPosition(
          () => {
            document.getElementById('loader').style.display = 'none';

            const msg = JSON.stringify({ type: 'AR_READY' });
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(msg);
            } else {
              window.postMessage(msg, '*');
            }
          },
          (err) => {
            document.getElementById('loader-text').textContent =
              'GPS error: ' + err.message;
            const banner = document.getElementById('gps-error');
            banner.textContent  = '⚠️ ' + err.message;
            banner.style.display = 'block';
          },
          { enableHighAccuracy: true }
        );
      });
    </script>
  </body>
</html>
