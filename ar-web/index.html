<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: black; }

      #loader {
        position: absolute; inset: 0; z-index: 999;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
      }
      #loader p { color: white; font-family: sans-serif; font-size: 16px; }

      #hint {
        position: absolute; bottom: 0; width: 100%;
        padding: 20px; background: rgba(0,0,0,0.75);
        color: white; font-family: sans-serif;
        font-size: 15px; text-align: center; z-index: 10;
      }

      #collect-toast {
        position: absolute;
        top: 40%; left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 200, 100, 0.9);
        color: white; font-family: sans-serif;
        font-size: 20px; font-weight: bold;
        padding: 14px 28px; border-radius: 30px;
        z-index: 100; display: none; pointer-events: none;
      }

      #gps-error {
        position: absolute; top: 0; left: 0; right: 0;
        background: rgba(255, 60, 60, 0.9);
        color: white; font-family: sans-serif; font-size: 13px;
        text-align: center; padding: 10px 16px;
        z-index: 200; display: none;
      }
    </style>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
  </head>

  <body>
    <div id="loader">
      <p id="loader-text">Acquiring GPS signal...</p>
    </div>

    <div id="gps-error"></div>

    <div id="hint">Walk outside and tap the 3D model to collect it!</div>

    <div id="collect-toast">✅ Collected!</div>

    <a-scene
      id="ar-scene"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
      renderer="antialias: true; alpha: true"
      loading-screen="enabled: false"
    >
      <a-assets id="ar-assets"></a-assets>
      <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>
      <!-- Models are injected dynamically via spawnModels() -->
    </a-scene>

    <script>
      const collectedIds = new Set();

      // ─── Spawn all models received from ─────────────────────────
      // Each loc: { id, latitude, longitude, modelUrl }
      // latitude/longitude come from modelCoordinates.lat/lng in your API
      function spawnModels(locations) {
        if (!Array.isArray(locations) || !locations.length) return;

        const scene  = document.getElementById('ar-scene');
        const assets = document.getElementById('ar-assets');

        locations.forEach((loc) => {
          const { id, latitude, longitude, modelUrl } = loc;
          if (!id || latitude == null || longitude == null || !modelUrl) return;

          // Register asset so A-Frame can preload the GLB
          const assetItem = document.createElement('a-asset-item');
          assetItem.setAttribute('id', `asset-${id}`);
          assetItem.setAttribute('src', modelUrl);
          assets.appendChild(assetItem);

          // Create the AR entity placed at modelCoordinates
          const entity = document.createElement('a-entity');
          entity.setAttribute('id', `model-${id}`);
          entity.setAttribute('gltf-model', `#asset-${id}`);
          entity.setAttribute('scale', '2 2 2');
          entity.setAttribute('rotation', '0 0 0');
          entity.setAttribute('gps-new-entity-place',
            `latitude: ${latitude}; longitude: ${longitude}`
          );
          entity.classList.add('clickable');
          entity.dataset.locationId = id;

          // Tap / click to collect
          entity.addEventListener('click', () => collectModel(entity, loc));
          entity.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            collectModel(entity, loc);
          });

          scene.appendChild(entity);
        });
      }

      // ─── Collect a model ─────────────────────────────────────────────────────
      function collectModel(entity, loc) {
        const lid = entity.dataset.locationId;
        if (collectedIds.has(lid)) return; // prevent double-collect
        collectedIds.add(lid);

        const payload = {
          type:        'AR_COLLECTED',
          modelId:     lid,
          modelUrl:    loc.modelUrl,
          latitude:    loc.latitude,
          longitude:   loc.longitude,
          collectedAt: new Date().toISOString(),
        };

        // Post back to React Native WebView
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(payload));
        } else {
          window.postMessage(JSON.stringify(payload), '*');
          console.log('[AR_COLLECTED]', payload);
        }

        // Show toast
        const toast = document.getElementById('collect-toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1800);

        // Animate model out then remove it from the scene
        entity.setAttribute('animation', {
          property: 'scale',
          to:       '0 0 0',
          dur:      500,
          easing:   'easeInQuad',
        });
        setTimeout(() => {
          if (entity.parentNode) entity.parentNode.removeChild(entity);
        }, 550);
      }

      // ─── Receive AR_CONFIG from React Native ─────────────────────────────────
      // ARScreen.js sends: { type: 'AR_CONFIG', locations: [...] }
      window.addEventListener('message', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'AR_CONFIG' && Array.isArray(data.locations)) {
            spawnModels(data.locations);
          }
        } catch (_) {}
      });

      // ─── GPS loader + AR_READY signal ────────────────────────────────────────
      document.getElementById('ar-scene').addEventListener('loaded', () => {
        navigator.geolocation.getCurrentPosition(
          () => {
            // Hide loader once GPS is confirmed
            document.getElementById('loader').style.display = 'none';

            // Tell React Native the AR scene is ready to receive locations
            const msg = JSON.stringify({ type: 'AR_READY' });
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(msg);
            } else {
              window.postMessage(msg, '*');
            }
          },
          (err) => {
            document.getElementById('loader-text').textContent =
              'GPS error: ' + err.message;
            const banner = document.getElementById('gps-error');
            banner.textContent = '⚠️ ' + err.message;
            banner.style.display = 'block';
          },
          { enableHighAccuracy: true }
        );
      });
    </script>
  </body>
</html>
